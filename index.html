<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Portfolio de développeur Full Stack spécialisé en React, Vue.js, Node.js et plus" />
    <title>Mon Portfolio - Développeur Full Stack</title>
    <link rel="stylesheet" href="/assets/css/reset.css">
    <link rel="stylesheet" href="/assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  </head>
  <body class="bg-light-bg dark:bg-dark-bg">
    <!-- Header placeholder -->
    <div id="header-placeholder"></div>

    <main>
      <!-- Hero Section -->
      <section class="hero animate">
        <div class="container">
          <h1>Développeur Full Stack</h1>
          <p class="hero-subtitle">Passionné par la création d'applications web modernes et performantes</p>
          <div class="hero-cta">
            <a href="#projects" class="btn btn-primary">Voir mes projets</a>
            <a href="#contact" class="btn btn-outline">Me contacter</a>
          </div>
        </div>
      </section>

      <!-- Skills Section -->
      <section id="skills" class="skills animate">
        <div class="container">
          <h2 class="section-title">Compétences</h2>
          <div class="skills-grid">
            <div class="skill-card">
              <h3>Frontend</h3>
              <ul>
                <li>React</li>
                <li>Vue.js</li>
                <li>HTML/CSS</li>
                <li>JavaScript</li>
              </ul>
            </div>
            <div class="skill-card">
              <h3>Backend</h3>
              <ul>
                <li>Node.js</li>
                <li>PHP</li>
                <li>SQL</li>
                <li>Laravel</li>
              </ul>
            </div>
            <div class="skill-card">
              <h3>Autres</h3>
              <ul>
                <li>Git</li>
                <li>Docker</li>
                <li>C/C++</li>
                <li>Java</li>
              </ul>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer placeholder -->
    <div id="footer-placeholder"></div>

    <script src="/js/main.js"></script>
  </body>
</html>
